name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      LIGHTWEIGHT_MODE: "1"
      DATABASE_URL: sqlite:///:memory:
      SECRET_KEY: ci-secret
      JWT_SECRET_KEY: ci-jwt-secret
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAILS: admin@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask Flask-Bcrypt Flask-Cors Flask-JWT-Extended Flask-SQLAlchemy psycopg2-binary requests beautifulsoup4 pdfminer.six SQLAlchemy

      - name: Compile backend
        run: python -m py_compile app.py config.py models/*.py routes/*.py services/*.py utils/*.py ai_engine/*.py

      - name: Smoke test AI fallbacks
        run: |
          python - <<'PY'
          from ai_engine.text_processor import TextProcessor
          from ai_engine.question_generator import QuestionGenerator
          sample = "Divide and conquer solves problems by dividing, conquering, and combining."
          processed = TextProcessor().process(sample)
          questions = QuestionGenerator().generate(processed["chunks"])
          assert processed["chunks"], "Expected text chunks"
          assert questions, "Expected generated questions"
          print("backend smoke ok")
          PY

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:5001
        run: npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          build-args: |
            VITE_API_BASE_URL=http://localhost:5001
